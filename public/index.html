<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ernakulam Bus Timings</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="manifest" href="/manifest.json">
    
    <!-- Firebase SDKs (modern module version) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.7.3/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/11.7.3/firebase-firestore.js";

        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCRa1qLfVfRvxl2KOvNpocNj7Z2xnuDt9Q",
            authDomain: "bustimingsapp.firebaseapp.com",
            projectId: "bustimingsapp",
            storageBucket: "bustimingsapp.firebasestorage.app",
            messagingSenderId: "201532782611",
            appId: "1:201532782611:web:a57dc47f2613c4afdfa7e6"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Make db available globally (for traditional scripts)
        window.firebaseDb = db;
    </script>
    
    <!-- Fallback for browsers that don't support modules -->
    <script nomodule>
        document.addEventListener('DOMContentLoaded', function() {
            alert("Your browser doesn't support modern JavaScript features. Please update your browser.");
        });
    </script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1><i class="fas fa-bus"></i> Ernakulam Bus Timings</h1>
            <p>Find real-time bus schedules across Ernakulam district</p>
        </header>
        
        <!-- Search Interface -->
        <div class="search-container">
            <div class="input-group">
                <label for="fromLocation"><i class="fas fa-map-marker-alt"></i> From</label>
                <select id="fromLocation">
                    <option value="">Select departure point</option>
                </select>
            </div>
            
            <div class="input-group">
                <label for="toLocation"><i class="fas fa-map-marker-alt"></i> To</label>
                <select id="toLocation">
                    <option value="">Select destination</option>
                </select>
            </div>
            
            <button id="searchBtn" class="primary-btn">
                <i class="fas fa-search"></i> Find Buses
            </button>
            
            <div class="live-search">
                <input type="text" id="busFilter" placeholder="Filter buses by name, number or type...">
                <i class="fas fa-search"></i>
            </div>
        </div>
        
        <!-- Results Section -->
        <div class="results-container">
            <div class="results-header">
                <h2>Available Buses</h2>
                <div class="sort-options">
                    <span>Sort by:</span>
                    <button class="sort-btn active" data-sort="time">Departure</button>
                    <button class="sort-btn" data-sort="duration">Duration</button>
                    <button class="sort-btn" data-sort="type">Bus Type</button>
                </div>
            </div>
            
            <div id="busResults" class="bus-results">
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading bus data...</p>
                </div>
            </div>
        </div>
        
        <!-- Recent Searches -->
        <div class="recent-searches">
            <h3><i class="fas fa-history"></i> Recent Searches</h3>
            <div id="recentSearchesList"></div>
        </div>
        
        <footer class="app-footer">
            <p>© 2023 Ernakulam Bus Timings | 
                <a href="/admin" class="admin-link">Admin Panel</a>
            </p>
        </footer>
    </div>

    <!-- Traditional Script Implementation -->
    <script>
        // This will use the db instance created by the module
        document.addEventListener('DOMContentLoaded', async function() {
            // Initialize UI components
            const fromSelect = document.getElementById('fromLocation');
            const toSelect = document.getElementById('toLocation');
            
            // Load locations from Firestore
            try {
                const querySnapshot = await getDocs(collection(window.firebaseDb, "locations"));
                querySnapshot.forEach((doc) => {
                    const option = document.createElement('option');
                    option.value = doc.id;
                    option.textContent = doc.data().name;
                    fromSelect.appendChild(option.cloneNode(true));
                    toSelect.appendChild(option);
                });
            } catch (error) {
                console.error("Error loading locations:", error);
            }
            
            // Rest of your traditional script logic...
        });
    </script>
    
    <!-- PWA Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>
</html>
